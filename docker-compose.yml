services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: domiki_qdrant
    ports:
      - "6333:6333"  # REST API + Dashboard
      - "6334:6334"  # gRPC
    volumes:
      - ./data/qdrant:/qdrant/storage
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__LOG_LEVEL: INFO
